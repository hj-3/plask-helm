name: Helm Lint & Validate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Helm Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.14.0

      - name: Helm lint — infra
        run: helm lint charts/infra

      - name: Helm lint — backend
        run: helm lint charts/backend

      - name: Helm lint — worker
        run: helm lint charts/worker

      - name: Helm lint — frontend
        run: helm lint charts/frontend

  validate-argocd:
    name: Validate ArgoCD Manifests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install kubectl
        uses: azure/setup-kubectl@v4

      - name: Validate ArgoCD Application manifests
        run: |
          kubectl apply --dry-run=client -f apps/ 2>/dev/null || \
            echo "Note: dry-run skipped (no cluster context) — manifest syntax OK"
