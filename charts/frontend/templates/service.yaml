apiVersion: v1
kind: Service
metadata:
  name: plask-frontend
  namespace: plask
  labels:
    app: plask-frontend
spec:
  type: {{ .Values.service.type }}
  selector:
    app: plask-frontend
  ports:
    - port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
      name: http
