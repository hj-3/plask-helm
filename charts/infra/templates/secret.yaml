# Shared application secret — referenced by backend and worker deployments
# In production, replace with Sealed Secrets or External Secrets Operator
apiVersion: v1
kind: Secret
metadata:
  name: plask-app-secret
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/managed-by: Helm
type: Opaque
stringData:
  DATABASE_URL: "postgresql://{{ .Values.postgres.user }}:{{ .Values.postgres.password }}@postgres-svc:{{ .Values.postgres.port }}/{{ .Values.postgres.database }}"
  JWT_SECRET: {{ .Values.secrets.jwtSecret | quote }}
  ADMIN_EMAIL: {{ .Values.secrets.adminEmail | quote }}
  ADMIN_PASSWORD: {{ .Values.secrets.adminPassword | quote }}
  ADMIN_NAME: {{ .Values.secrets.adminName | quote }}
  SMTP_HOST: {{ .Values.secrets.smtpHost | quote }}
  SMTP_PORT: {{ .Values.secrets.smtpPort | quote }}
  SMTP_USER: {{ .Values.secrets.smtpUser | quote }}
  SMTP_PASS: {{ .Values.secrets.smtpPass | quote }}
  SMTP_FROM: {{ .Values.secrets.smtpFrom | quote }}
