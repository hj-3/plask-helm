namespace: plask

# External PostgreSQL (VM)
postgres:
  host: "192.168.80.150"
  port: 5432
  database: plask
  user: plask_user          # 실제 DB 유저명으로 변경
  password: "CHANGE_ME"     # secrets.create: false 시 미사용

# External Redis Session (VM: port 6379)
redisSession:
  host: "192.168.80.160"
  port: 6379

# External Redis Queue (VM: port 6380)
redisQueue:
  host: "192.168.80.160"
  port: 6380

# Secret 생성 방식 선택
# true  → Helm이 아래 값으로 plask-app-secret 생성 (개발/테스트)
# false → kubectl로 수동 생성 (운영환경 권장, 아래 값 무시됨)
secrets:
  create: false
  jwtSecret: ""
  adminEmail: ""
  adminPassword: ""
  adminName: ""
  smtpHost: "smtp.gmail.com"
  smtpPort: "587"
  smtpUser: ""
  smtpPass: ""
  smtpFrom: ""
