# Grafana Dashboard ConfigMap
# kube-prometheus-stack이 이 ConfigMap을 자동으로 임포트합니다
# Label: grafana_dashboard: "1" 필요
apiVersion: v1
kind: ConfigMap
metadata:
  name: plask-grafana-dashboard
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
data:
  plask-dashboard.json: |
    {
      "title": "Plask — Application Dashboard",
      "uid": "plask-app",
      "schemaVersion": 36,
      "version": 1,
      "refresh": "30s",
      "time": { "from": "now-1h", "to": "now" },
      "panels": [
        {
          "id": 1,
          "title": "HTTP Requests / sec",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 0 },
          "targets": [
            {
              "expr": "sum(rate(plask_http_requests_total[1m])) by (route, method)",
              "legendFormat": "{{method}} {{route}}"
            }
          ]
        },
        {
          "id": 2,
          "title": "HTTP Request Duration P99 (ms)",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 0 },
          "targets": [
            {
              "expr": "histogram_quantile(0.99, sum(rate(plask_http_request_duration_seconds_bucket[5m])) by (le, route)) * 1000",
              "legendFormat": "p99 {{route}}"
            }
          ]
        },
        {
          "id": 3,
          "title": "HTTP Error Rate (4xx/5xx)",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 8 },
          "targets": [
            {
              "expr": "sum(rate(plask_http_requests_total{status_code=~\"[45]..\"}[1m])) by (status_code)",
              "legendFormat": "{{status_code}}"
            }
          ]
        },
        {
          "id": 4,
          "title": "Backend Pod CPU Usage",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 8 },
          "targets": [
            {
              "expr": "sum(rate(container_cpu_usage_seconds_total{namespace=\"plask\",pod=~\"plask-backend.*\"}[1m])) by (pod)",
              "legendFormat": "{{pod}}"
            }
          ]
        },
        {
          "id": 5,
          "title": "Backend Pod Memory Usage (MB)",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 16 },
          "targets": [
            {
              "expr": "sum(container_memory_working_set_bytes{namespace=\"plask\",pod=~\"plask-backend.*\"}) by (pod) / 1024 / 1024",
              "legendFormat": "{{pod}}"
            }
          ]
        },
        {
          "id": 6,
          "title": "Frontend Pod CPU Usage",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 16 },
          "targets": [
            {
              "expr": "sum(rate(container_cpu_usage_seconds_total{namespace=\"plask\",pod=~\"plask-frontend.*\"}[1m])) by (pod)",
              "legendFormat": "{{pod}}"
            }
          ]
        },
        {
          "id": 7,
          "title": "Worker Pod Count",
          "type": "stat",
          "gridPos": { "h": 4, "w": 6, "x": 0, "y": 24 },
          "targets": [
            {
              "expr": "count(kube_pod_info{namespace=\"plask\",pod=~\"plask-worker.*\"})"
            }
          ]
        },
        {
          "id": 8,
          "title": "Backend Replica Count",
          "type": "stat",
          "gridPos": { "h": 4, "w": 6, "x": 6, "y": 24 },
          "targets": [
            {
              "expr": "kube_deployment_status_replicas_available{namespace=\"plask\",deployment=\"plask-backend\"}"
            }
          ]
        },
        {
          "id": 9,
          "title": "Node.js Process Heap Used (MB)",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 24 },
          "targets": [
            {
              "expr": "plask_nodejs_heap_size_used_bytes{namespace=\"plask\"} / 1024 / 1024",
              "legendFormat": "{{pod}} heap"
            }
          ]
        }
      ]
    }
